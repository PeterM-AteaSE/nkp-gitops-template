#@data/values
---
#! Cluster Name
name: local-test
#! Cluster type
env: dev

#! Citrix Ingress Controller Config
cic:
  #! Administrative address (nitro-api)
  nsIP: 192.168.1.1
  #! Default CS IP in Netscaler for LAN services
  nsVIP: 192.168.1.2
  #! Default CS IP in Netscaler for public services
  nsInternetVIP: 192.168.1.3
  #! Local subnet address for Netscaler for this cluster
  #! Used for setting Policy Based Routes
  nsSNIPS: 192.168.1.4
