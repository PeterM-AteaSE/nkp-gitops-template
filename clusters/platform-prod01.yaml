#@data/values
---
#! Cluster Name
name: platform-prod01
#! Cluster type
env: prod

#! Citrix Ingress Controller Config
cic:
  #! Administrative address (nitro-api)
  nsIP: <NETSCALER_NSIP>
  #! Default CS IP in Netscaler for LAN services
  nsVIP: <CLUSTER_PROD_NSVIP>
  #! Default CS IP in Netscaler for public services
  nsInternetVIP: <CLUSTER_PROD_INTERNET_VIP>
  #! Local subnet address for Netscaler for this cluster
  #! Used for setting Policy Based Routes
  nsSNIPS: <CLUSTER_PROD_SNIP>

argocd:
  server:
    replicas: 2
    serverUrl: "argocd.k8s.<CUSTOMER_K8S_DOMAIN>"
    grpcUrl: "argocd-grpc.k8s.<CUSTOMER_K8S_DOMAIN>"
  controller:
    sharding: false
    replicas: 2

adcs:
  url: "https://<CUSTOMER_ADCS_HOSTNAME>/certsrv"
  templateName: "WebServer"
  statusCheckInterval: "6h"
  retryInterval: "1h"
