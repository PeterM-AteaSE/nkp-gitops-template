---
# External Secret for ArgoCD Cluster Registration
# This creates an ArgoCD cluster secret with TLS client configuration from Azure Key Vault
# 
# Approach 1: Template JSON from Multiple Key Vault Secrets
# - Fetches certificate, key, and CA data from separate Azure Key Vault secrets  
# - Constructs the cluster config JSON with TLS client configuration
#
# Prerequisites:
# - Store the following secrets in Azure Key Vault (<AZURE_KEY_VAULT_NAME>):
#   - argocd-cluster-<cluster-name>-cert     (client certificate - base64 encoded)
#   - argocd-cluster-<cluster-name>-key      (client key - base64 encoded)
#   - argocd-cluster-<cluster-name>-ca       (CA certificate - base64 encoded)
#
# Usage:
# 1. Copy this file and customize for your cluster
# 2. Update metadata.name, target.name, and all placeholder values
# 3. Ensure secrets exist in Azure Key Vault with correct names
# 4. Apply to cluster where ArgoCD is running

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-cluster-platform-prod01
  namespace: platform-argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: eso-store-platform
    kind: SecretStore
  target:
    name: cluster-platform-prod01
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      type: Opaque
      data:
        # Cluster name (display name in ArgoCD UI)
        name: platform-prod01
        
        # Kubernetes API server URL
        server: https://<CLUSTER_PROD_API_SERVER_IP>:443
        
        # ArgoCD project this cluster belongs to
        project: default
        
        # TLS client configuration as JSON
        config: |
          {
            "bearerToken": "{{ .bearerToken }}",
            "tlsClientConfig": {
              "insecure": false,
              "caData": "{{ .caData }}"
            }
          }
  data:
    # Bearer token for authentication (if using token-based auth)
    - secretKey: bearerToken
      remoteRef:
        key: argocd-cluster-platform-prod01-token
    
    # CA certificate for validating the cluster's API server
    - secretKey: caData
      remoteRef:
        key: argocd-cluster-platform-prod01-ca
