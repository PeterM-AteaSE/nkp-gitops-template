---
# External Secret using External Secrets Operator
# This pulls secrets from Azure Key Vault and creates the argocd-env-secret
#@ load("@ytt:data", "data")
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-env-secret
  namespace: platform-argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: eso-store-platform
    kind: SecretStore
  target:
    name: argocd-env-secret
    creationPolicy: Owner
  data:
    # Pull OIDC client secret from Azure Key Vault
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: argocd-oidc-clientSecret
    
    # Add other secrets as needed
    # - secretKey: DATABASE_PASSWORD
    #   remoteRef:
    #     key: argocd-database-password
