#@ load("@ytt:data", "data")
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: #@ data.values.name + "-argocd"
  namespace: platform-argocd
  labels:
    app: "nsic"
spec:
  destination:
    name: #@ data.values.name
    namespace: platform-netscaler
  project: platform
  source:
    directory:
      jsonnet: {}
      recurse: true
    path: #@ "deployments/" + data.values.name + "/netscaler-ingress"
    repoURL: ssh://git@github.com:<GITHUB_ORG>/<GITHUB_REPO>.git
    targetRevision: HEAD
  syncPolicy:
    automated: {}
