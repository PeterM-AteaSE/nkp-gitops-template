---
# External Secret for ArgoCD Cluster Registration: platform-test01
# This creates an ArgoCD cluster secret with TLS client configuration from Azure Key Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-cluster-platform-test01
  namespace: platform-argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: eso-store-platform
    kind: SecretStore
  target:
    name: cluster-platform-test01
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      type: Opaque
      data:
        # Cluster name (display name in ArgoCD UI)
        name: platform-test01
        
        # Kubernetes API server URL
        server: https://<CLUSTER_TEST_API_SERVER_IP>:443
        
        # ArgoCD project this cluster belongs to
        project: default
        
        # TLS client configuration as JSON
        config: |
          {
            "bearerToken": "{{ .bearerToken }}",
            "tlsClientConfig": {
              "insecure": false,
              "caData": "{{ .caData }}"
            }
          }
  data:
    # Bearer token for authentication
    - secretKey: bearerToken
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: argocd-cluster-platform-test01-token
        metadataPolicy: None
    
    # CA certificate for validating the cluster's API server
    - secretKey: caData
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: argocd-cluster-platform-test01-ca
        metadataPolicy: None
